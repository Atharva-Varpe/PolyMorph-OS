# PolyMorph Bootstrap Module Configuration
# This module handles multi-distribution bootstrapping

---
type: "job"
name: "polymorph_bootstrap"
interface: "python"
script: "polymorph_bootstrap.py"
weight: 10

# This module must run AFTER partitioning but BEFORE package installation
# Sequence: partition → mount → polymorph_bootstrap → packages → bootloader

# Emergency contact (optional)
emergency:
    contact: "https://github.com/Atharva-Varpe/PolyMorph-OS/issues"
