# PolyMorph OS - Unified Multi-Distribution Installer
# 
# ONE ISO - ANY DISTRIBUTION
# 
# Architecture:
#   - Live Environment: Arch Linux (provides bootstrap tools)
#   - Target Installation: User's choice (Arch, Debian, Ubuntu, etc.)
# 
# How it works:
#   1. User boots Arch-based live ISO
#   2. Calamares installer loads this configuration
#   3. User selects BASE DISTRIBUTION (which OS to install)
