---
# PolyMorph Calamares Configuration - Universal Installer
# Single live ISO, user-selectable target base distribution.

# IMPORTANT:
# - `polymorph_bootstrap` performs the base bootstrap AND installs selected packages.
# - `unpackfs` and `packages` are intentionally NOT used, to avoid overwriting
#   the bootstrapped target system or invoking the wrong package manager.

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - netinstall
      - summary
  - exec:
      - partition
      - mount
      - polymorph_bootstrap
      - networkcfg
      - hwclock
      - machineid
      - fstab
      - locale
      - keyboard
      - localec
      - grubcfg
      - bootloader
      - umount
  - show:
      - finished

modules-search: [./modules]
branding: polymorph

welcome:
  showSupportUrl: false
  showKnownIssuesUrl: false
  showReleaseNotesUrl: false

netinstall:
  url: file:///etc/calamares/netinstall.yaml

bootloader:
  efiBootLoader: "grub"
  biosBootLoader: "grub"
