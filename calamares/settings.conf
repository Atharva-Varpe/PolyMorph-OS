---
# PolyMorph Calamares Configuration - Multi-Distribution Installer
# ONE ISO → ANY DISTRO Architecture
sequence:
  show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - netinstall
    - summary
  exec:
    - partition
    - mount
    - polymorph_bootstrap  # NEW: Multi-distro bootstrap (Arch/Debian/Ubuntu)
    - unpackfs             # May be skipped if bootstrap handles base system
    - networkcfg
    - hwclock
    - machineid
    - fstab
    - locale
    - keyboard
    - localenc
    - packages             # Installs additional packages from netinstall
    - grubcfg
    - bootloader
    - umount
  show:
    - finished

modules-search: [./modules]
branding: polymorph

welcome:
  showSupportUrl: false
  showKnownIssuesUrl: false
  showReleaseNotesUrl: false

netinstall:
  url: file:///etc/calamares/netinstall.yaml

packages:
  removeUnselected: false

bootloader:
  efiBootLoader: "grub"
  biosBootLoader: "grub"
