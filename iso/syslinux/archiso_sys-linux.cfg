LABEL arch
TEXT HELP
Boot the PolyMorph Linux installer on BIOS.
Install any major Linux distribution with full customization.
ENDTEXT
MENU LABEL PolyMorph Linux (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

# Accessibility boot option
LABEL archspeech
TEXT HELP
Boot the PolyMorph Linux installer on BIOS with speakup screen reader.
Install any major Linux distribution with full customization and speech feedback.
ENDTEXT
MENU LABEL PolyMorph Linux (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
